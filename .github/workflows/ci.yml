name: exact-package-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python scripts/verify_public_package.py
      - run: python scripts/recheck_frozen_artifacts.py
      - run: python scripts/recheck_catalogue.py
      - run: python -m unittest discover -s tests -v

  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: python scripts/recheck_catalogue.py
      - uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: paper
          latexmk_use_xelatex: false
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

  full-global-congruence:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/verify_global_congruence.py --print-environment
      - run: python scripts/compare_global_replay.py
